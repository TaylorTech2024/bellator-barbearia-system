services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bellator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bellator_pg:/var/lib/postgresql/data

  api:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bellator
      DB_USER: postgres
      DB_PASS: postgres
      JWT_SECRET: "CHANGE_ME_SUPER_SECRET_64_CHARS_MINIMUM_CHANGE_ME_SUPER_SECRET_64"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,https://taylortech2024.github.io"
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  bellator_pg:
